  /* Inline hex + alpha inputs on color rows */
  function bindColorRowInputs(target) {
    const hex = $(`${target}HexInput`);
    const alpha = $(`${target}AlphaInput`);
    hex.addEventListener('change', () => {
      const v = hex.value.replace('#','').trim();
      if (/^[0-9a-fA-F]{6}$/.test(v)) {
        pushHistory('color');
        setTargetPrimary(target, '#' + v.toLowerCase(), null);
        // Editing artboard fill replaces a preset gradient → revert to Custom.
        if (target === 'artboard') state.style = 'custom';
        applyAll();
        reinitPickerIfOpen(target);
      } else {
        hex.value = targetPrimary(target).color.replace('#','').toUpperCase();
      }
    });
    alpha.addEventListener('input', () => {
      let v = +alpha.value;
      if (!Number.isFinite(v)) return;
      v = Math.max(0, Math.min(100, v));
      setTargetPrimary(target, null, v);
      if (target === 'artboard') state.style = 'custom';
      applyAll();
      reinitPickerIfOpen(target);
    });
    alpha.addEventListener('change', () => pushHistory('alpha'));
  }
  function reinitPickerIfOpen(target) {
    if (!picker.classList.contains('open') || pkState.target !== target) return;
    openPicker(target, null, true);
  }
  ['artboard', 'grid', 'box'].forEach(bindColorRowInputs);

  function buildSVG(forRaster = false) {
    const { bannerW, bannerH, padding, cols, rows,
            artboardColor, artboardAlpha,
            gridColor, gridAlpha, gridStroke,
            boxColor, boxAlpha,
            shape, neckR } = state;
    const cw = (bannerW - 2 * padding) / cols;
    const ch = (bannerH - 2 * padding) / rows;
    const [gr,gg,gb] = hexToRgb(gridColor);

    let s = `<svg xmlns="http://www.w3.org/2000/svg" width="${bannerW}" height="${bannerH}" viewBox="0 0 ${bannerW} ${bannerH}">`;
    s += `<defs><filter id="goo" x="-10%" y="-10%" width="120%" height="120%">`;
    s += `<feGaussianBlur in="SourceGraphic" stdDeviation="${Math.max(state.boxR, 0.001)}" result="blur"/>`;
    s += `<feColorMatrix in="blur" values="${gooMatrixValues(neckR)}" result="shape"/>`;
    s += `<feFlood flood-color="${boxColor}" flood-opacity="${boxAlpha/100}" result="flood"/>`;
    s += `<feComposite in="flood" in2="shape" operator="in"/>`;
    s += `</filter></defs>`;
    s += `<rect width="${bannerW}" height="${bannerH}" fill="${artboardColor}" fill-opacity="${artboardAlpha/100}"/>`;

    s += `<g stroke="rgb(${gr},${gg},${gb})" stroke-opacity="${gridAlpha/100}" stroke-width="${gridStroke}" shape-rendering="${gridStroke < 1 ? 'geometricPrecision' : 'crispEdges'}">`;
    for (let c = 0; c <= cols; c++) {
      const x = padding + c * cw;
      s += `<line x1="${x}" y1="${padding}" x2="${x}" y2="${padding + rows * ch}"/>`;
    }
    for (let r = 0; r <= rows; r++) {
      const y = padding + r * ch;
      s += `<line x1="${padding}" y1="${y}" x2="${padding + cols * cw}" y2="${y}"/>`;
    }
    s += `</g>`;
    if (filled.size > 0) {
      s += `<g filter="url(#goo)">`;
      for (const key of filled) {
        const [r, c] = key.split(',').map(Number);
        s += buildShapeSvg(shape, { x: padding + c*cw, y: padding + r*ch, w: cw, h: ch }, boxColor);
      }
      s += `</g>`;
    }
    s += `</svg>`;
    return s;
  }
  function download(filename, blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  function rasterize(scale) {
    return new Promise((resolve, reject) => {
      const svg = buildSVG();
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = state.bannerW * scale;
        canvas.height = state.bannerH * scale;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        resolve(canvas);
      };
      img.onerror = e => { URL.revokeObjectURL(url); reject(e); };
      img.src = url;
    });
  }

  /* ---- True-vector SVG export ----
     Bake the goo filter into actual <path> shapes via:
     1. Render boxes-only SVG with filter to canvas at SS scale
     2. Threshold the alpha channel
     3. Marching squares → boundary line segments per 2×2 sample
     4. Chain segments by shared endpoints into closed loops (one per island)
     5. Convert each loop to a quadratic-bezier path through midpoints (C1-smooth)
     6. Emit SVG with #background, #grid and #boxes groups, no <filter> */
  function buildBoxesOnlyFilterSVG(W, H) {
    const { bannerW, bannerH, padding, cols, rows, shape, neckR } = state;
    const cw = (bannerW - 2 * padding) / cols;
    const ch = (bannerH - 2 * padding) / rows;
    const perspective = state.gridType === 'perspective';
    const diagonal = state.gridType === 'diagonal';
    const innerW = bannerW - 2 * padding, innerH = bannerH - 2 * padding;
    let s = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${bannerW} ${bannerH}">`;
    s += `<defs><filter id="goo" x="-10%" y="-10%" width="120%" height="120%">`;
    s += `<feGaussianBlur in="SourceGraphic" stdDeviation="${Math.max(state.boxR, 0.001)}" result="blur"/>`;
    s += `<feColorMatrix in="blur" values="${gooMatrixValues(neckR)}" result="shape"/>`;
    s += `<feFlood flood-color="#ffffff" flood-opacity="1" result="flood"/>`;
    s += `<feComposite in="flood" in2="shape" operator="in"/>`;
    s += `</filter>`;
    if (perspective) s += `<clipPath id="innerClip"><rect x="${padding}" y="${padding}" width="${innerW}" height="${innerH}"/></clipPath>`;
    s += `</defs>`;
    if (filled.size > 0) {
      let rects = '';
      for (const key of filled) {
        if (diagonal) {
          // New diagonal mode: each filled key is a polygon piece (cell ∩ band).
          rects += `<polygon points="${diagPiecePoints(key).map(p => p[0] + ',' + p[1]).join(' ')}" fill="#ffffff"/>`;
        } else {
          const [r, c] = key.split(',').map(Number);
          rects += buildShapeSvg(shape, { x: padding + c*cw, y: padding + r*ch, w: cw, h: ch }, '#ffffff');
        }
      }
      // Perspective: rotate the goo group around the inner-area centre and clip it
      // to the inner rect, so the rasterised silhouette matches the live canvas.
      const grp = `<g filter="url(#goo)"${perspective ? ` transform="${gridSvgTransform(bannerW/2, bannerH/2)}"` : ''}>${rects}</g>`;
      s += perspective ? `<g clip-path="url(#innerClip)">${grp}</g>` : grp;
    }
    s += `</svg>`;
    return s;
  }

  function rasterizeAlpha(scale) {
    return new Promise((resolve, reject) => {
      const W = Math.round(state.bannerW * scale);
      const H = Math.round(state.bannerH * scale);
      const svg = buildBoxesOnlyFilterSVG(W, H);
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, W, H);
        const imgData = ctx.getImageData(0, 0, W, H);
        URL.revokeObjectURL(url);
        resolve({ W, H, data: imgData.data });
      };
      img.onerror = e => { URL.revokeObjectURL(url); reject(e); };
      img.src = url;
    });
  }

  function extractContours(data, W, H, threshold = 128) {
    // Read full alpha array (subpixel-accurate boundary needs raw values)
    const alpha = new Uint8Array(W * H);
    for (let i = 0; i < W * H; i++) alpha[i] = data[i * 4 + 3];

    // Linear-interpolated edge-crossing fraction (clamped)
    const t = (a, b) => {
      if (a === b) return 0.5;
      const v = (threshold - a) / (b - a);
      return v < 0 ? 0 : v > 1 ? 1 : v;
    };

    const segments = [];
    for (let y = 0; y < H - 1; y++) {
      const yo = y * W;
      const y1o = yo + W;
      for (let x = 0; x < W - 1; x++) {
        const aTL = alpha[yo + x], aTR = alpha[yo + x + 1];
        const aBR = alpha[y1o + x + 1], aBL = alpha[y1o + x];
        const mask = ((aTL > threshold) ? 1 : 0)
                   | ((aTR > threshold) ? 2 : 0)
                   | ((aBR > threshold) ? 4 : 0)
                   | ((aBL > threshold) ? 8 : 0);
        if (mask === 0 || mask === 15) continue;
        // Subpixel edge crossings
        const T = [x + t(aTL, aTR), y];
        const R = [x + 1, y + t(aTR, aBR)];
        const B = [x + t(aBL, aBR), y + 1];
        const L = [x, y + t(aTL, aBL)];
        switch (mask) {
          case 1: case 14: segments.push([L, T]); break;
          case 2: case 13: segments.push([T, R]); break;
          case 3: case 12: segments.push([L, R]); break;
          case 4: case 11: segments.push([R, B]); break;
          case 5: segments.push([L, T]); segments.push([R, B]); break;
          case 6: case 9: segments.push([T, B]); break;
          case 7: case 8: segments.push([L, B]); break;
          case 10: segments.push([T, R]); segments.push([L, B]); break;
        }
      }
    }

    // Index segments by endpoint
    const pointMap = new Map();
    for (let i = 0; i < segments.length; i++) {
      const seg = segments[i];
      const k0 = seg[0][0] + ',' + seg[0][1];
      const k1 = seg[1][0] + ',' + seg[1][1];
      (pointMap.get(k0) || pointMap.set(k0, []).get(k0)).push(i);
      (pointMap.get(k1) || pointMap.set(k1, []).get(k1)).push(i);
    }

    const used = new Uint8Array(segments.length);
    const loops = [];
    for (let start = 0; start < segments.length; start++) {
      if (used[start]) continue;
      const loop = [];
      let curIdx = start;
      let curPt = segments[start][0];
      let guard = segments.length + 2;
      while (curIdx !== -1 && !used[curIdx] && guard-- > 0) {
        used[curIdx] = 1;
        const seg = segments[curIdx];
        const next = (seg[0][0] === curPt[0] && seg[0][1] === curPt[1]) ? seg[1] : seg[0];
        loop.push(next);
        const k = next[0] + ',' + next[1];
        const cands = pointMap.get(k);
        let nextIdx = -1;
        if (cands) for (const c of cands) if (!used[c]) { nextIdx = c; break; }
        curIdx = nextIdx;
        curPt = next;
      }
      if (loop.length >= 3) loops.push(loop);
    }
    return loops;
  }

  // Light moving-average smoothing of a closed polyline — removes the marching-
  // squares stair-stepping before we fit curves through it.
  function smoothClosed(loop, iters) {
    let pts = loop;
    for (let k = 0; k < iters; k++) {
      const N = pts.length;
      const out = new Array(N);
      for (let i = 0; i < N; i++) {
        const p = pts[(i - 1 + N) % N], c = pts[i], n = pts[(i + 1) % N];
        out[i] = [0.25 * p[0] + 0.5 * c[0] + 0.25 * n[0], 0.25 * p[1] + 0.5 * c[1] + 0.25 * n[1]];
      }
      pts = out;
    }
    return pts;
  }
  // Resample a closed polyline to evenly-spaced points (by arc length). Marching
  // squares emits points unevenly (denser on axis-aligned edges); even spacing is
  // what keeps the Catmull-Rom fit smooth instead of kinking on low-curvature runs.
  function resampleClosed(loop, spacing) {
    const N = loop.length;
    if (N < 4) return loop;
    const seg = new Array(N);
    let perim = 0;
    for (let i = 0; i < N; i++) {
      const a = loop[i], b = loop[(i + 1) % N];
      seg[i] = Math.hypot(b[0] - a[0], b[1] - a[1]);
      perim += seg[i];
    }
    if (perim === 0) return loop;
    const count = Math.max(8, Math.round(perim / spacing));
    const step = perim / count;
    const out = [];
    let segIdx = 0, segStart = 0;
    for (let i = 0; i < count; i++) {
      const target = i * step;
      while (segIdx < N && segStart + seg[segIdx] < target) { segStart += seg[segIdx]; segIdx++; }
      if (segIdx >= N) break;
      const a = loop[segIdx], b = loop[(segIdx + 1) % N];
      const f = seg[segIdx] > 0 ? (target - segStart) / seg[segIdx] : 0;
      out.push([a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f]);
    }
    return out.length >= 4 ? out : loop;
  }

  // Catmull-Rom spline → cubic Bezier path. Passes through every input point
  // with C1-continuous tangents derived from neighbors. Result is truly smooth
  // (no visible polygon edges at any zoom level).
  function loopToCatmullRomPath(loop, decimals = 2) {
    const N = loop.length;
    if (N < 4) return '';
    const f = n => +n.toFixed(decimals);
    const pt = i => loop[((i % N) + N) % N];
    const p0 = pt(0);
    let s = `M${f(p0[0])} ${f(p0[1])}`;
    for (let i = 0; i < N; i++) {
      const a = pt(i - 1), b = pt(i), c = pt(i + 1), d = pt(i + 2);
      const c1x = b[0] + (c[0] - a[0]) / 6;
      const c1y = b[1] + (c[1] - a[1]) / 6;
      const c2x = c[0] - (d[0] - b[0]) / 6;
      const c2y = c[1] - (d[1] - b[1]) / 6;
      s += `C${f(c1x)} ${f(c1y)} ${f(c2x)} ${f(c2y)} ${f(c[0])} ${f(c[1])}`;
    }
    s += 'Z';
    return s;
  }

  async function buildVectorSVG() {
    const { bannerW, bannerH, padding, cols, rows,
            artboardColor, artboardAlpha,
            gridColor, gridAlpha, gridStroke,
            boxColor, boxAlpha } = state;
    const cw = (bannerW - 2 * padding) / cols;
    const ch = (bannerH - 2 * padding) / rows;
    const [gr, gg, gb] = hexToRgb(gridColor);

    // Higher supersampling → finer alpha gradient → smoother subpixel interp.
    // Adaptive based on artboard area; capped to keep canvas reads under control.
    const area = bannerW * bannerH;
    const ss = area > 2_000_000 ? 1
             : area > 1_000_000 ? 2
             : area > 500_000   ? 3
             :                    4;

    let boxPaths = '';
    if (filled.size > 0) {
      const { W, H, data } = await rasterizeAlpha(ss);
      const loops = extractContours(data, W, H);
      if (loops.length > 0) {
        boxPaths = loops.map(loop => {
          const scaled = loop.map(p => [p[0] / ss, p[1] / ss]);  // raster → artboard px
          // Smooth → even-resample → smooth again. Export fidelity (not preview)
          // is what matters here, so we favour soft, flowing curves.
          const pre = smoothClosed(scaled, 3);                   // remove stair-stepping
          const even = resampleClosed(pre, 3);                   // evenly-spaced control points (~3px)
          const soft = smoothClosed(even, 1);                    // final polish on even points
          return `<path d="${loopToCatmullRomPath(soft)}"/>`;
        }).join('');
      }
    }

    // Resolve paints to SVG gradient defs + fill refs
    const abPaint = paintToSVG(state.artboardPaint, 'artboardGrad');
    const boxP = paintToSVG(state.boxPaint, 'boxGrad');
    let defs = '';
    if (abPaint.def) defs += abPaint.def;
    if (boxPaths && boxP.def) defs += boxP.def;

    const perspective = state.gridType === 'perspective';
    const diagonal = state.gridType === 'diagonal';
    const innerW = bannerW - 2 * padding, innerH = bannerH - 2 * padding;
    if (perspective) defs += `<clipPath id="gridClip"><rect x="${padding}" y="${padding}" width="${innerW}" height="${innerH}"/></clipPath>`;

    // Build the grid lines (classic: bounded to cols×rows; perspective: extended
    // lattice, later rotated + clipped to the inner rect).
    let gridLines = '';
    if (perspective) {
      const { cMin, cMax, rMin, rMax } = diagLatticeRange();
      const x0 = padding + cMin * cw, x1 = padding + (cMax + 1) * cw;
      const y0 = padding + rMin * ch, y1 = padding + (rMax + 1) * ch;
      for (let c = cMin; c <= cMax + 1; c++) { const x = padding + c * cw; gridLines += `<line x1="${x}" y1="${y0}" x2="${x}" y2="${y1}"/>`; }
      for (let r = rMin; r <= rMax + 1; r++) { const y = padding + r * ch; gridLines += `<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}"/>`; }
    } else {
      for (let c = 0; c <= cols; c++) { const x = padding + c * cw; gridLines += `<line x1="${x}" y1="${padding}" x2="${x}" y2="${padding + rows * ch}"/>`; }
      for (let r = 0; r <= rows; r++) { const y = padding + r * ch; gridLines += `<line x1="${padding}" y1="${y}" x2="${padding + cols * cw}" y2="${y}"/>`; }
      // New diagonal mode: extra 45° lines overlaid on the classic grid.
      if (diagonal) gridLines += diagOverlayLines(padding);
    }
    const gridAttrs = `stroke="rgb(${gr},${gg},${gb})" stroke-opacity="${gridAlpha/100}" stroke-width="${gridStroke}" fill="none" shape-rendering="${gridStroke < 1 ? 'geometricPrecision' : 'crispEdges'}"`;

    let s = `<svg xmlns="http://www.w3.org/2000/svg" width="${bannerW}" height="${bannerH}" viewBox="0 0 ${bannerW} ${bannerH}">`;
    if (defs) s += `<defs>${defs}</defs>`;
    s += `<rect id="background" width="${bannerW}" height="${bannerH}" fill="${abPaint.fill}" fill-opacity="${abPaint.opacity}"/>`;
    if (perspective) {
      s += `<g id="grid" clip-path="url(#gridClip)"><g transform="${gridSvgTransform(bannerW/2, bannerH/2)}" ${gridAttrs}>${gridLines}</g></g>`;
    } else {
      s += `<g id="grid" ${gridAttrs}>${gridLines}</g>`;
    }
    if (boxPaths) {
      s += `<g id="boxes" fill="${boxP.fill}" fill-opacity="${boxP.opacity}" fill-rule="evenodd">${boxPaths}</g>`;
    }
    s += `</svg>`;
    return s;
  }

  /* --- File download + rasterise helpers (web export) --- */
  function download(filename, blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  // Rasterise the baked-vector SVG to a canvas at the given scale.
  // `bg` (optional) paints a backdrop first — needed for JPG which has no alpha.
  async function rasterize(scale, bg) {
    const svg = await buildVectorSVG();
    return new Promise((resolve, reject) => {
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(state.bannerW * scale);
        canvas.height = Math.round(state.bannerH * scale);
        const ctx = canvas.getContext('2d');
        if (bg) { ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        resolve(canvas);
      };
      img.onerror = e => { URL.revokeObjectURL(url); reject(e); };
      img.src = url;
    });
  }

  /* Reset — clear the painted cells and restore the base screen for the
     currently selected style (Custom/Blue/…). Geometry (template dims) and
     brush size are kept; everything is one undo step. */
  function resetProject() {
    pushHistory('reset-project');
    filled.clear();
    const st = STYLES[state.style] || STYLES.custom;
    if (st.gradient) {
      state.artboardPaint = { type: 'linear', angle: 135, stops: [
        { color: st.gradient[0], alpha: 100, pos: 0 },
        { color: st.gradient[1], alpha: 100, pos: 1 },
      ]};
      state.boxPaint = { type: 'solid', angle: 135, stops: [
        { color: st.box.color, alpha: st.box.alpha, pos: 0 },
        { color: st.box.color, alpha: 0, pos: 1 },
      ]};
    } else {
      // Custom = factory defaults (matches the initial `state`).
      state.artboardPaint = { type: 'solid', angle: 135, stops: [
        { color: '#2a2a2a', alpha: 100, pos: 0 }, { color: '#000000', alpha: 100, pos: 1 } ]};
      state.boxPaint = { type: 'solid', angle: 135, stops: [
        { color: '#ffd400', alpha: 100, pos: 0 }, { color: '#ffffff', alpha: 100, pos: 1 } ]};
    }
    state.boxR = 8;
    state.neckR = 12;
    state.shape = 'square';
    syncPaintToLegacy('artboard');
    syncPaintToLegacy('box');
    if (picker.classList.contains('open')) closePicker();
    applyAll();
    toast('Reset');
  }
  $('resetBtn').addEventListener('click', resetProject);

  /* Export format / scale selectors */
  $('exportFormat').value = state.exportFormat;
  $('exportScale').value = String(state.exportScale);
  $('exportLabel').textContent = state.exportFormat.toUpperCase();
  $('exportFormat').addEventListener('change', e => {
    state.exportFormat = e.target.value;
    $('exportLabel').textContent = state.exportFormat.toUpperCase();
  });
  $('exportScale').addEventListener('change', e => {
    state.exportScale = +e.target.value;
  });

  /* Export to file — true-vector SVG, or rasterised PNG/JPG at the chosen scale. */
  $('exportBtn').addEventListener('click', async () => {
    const fmt = state.exportFormat, scale = state.exportScale;
    try {
      if (fmt === 'svg') {
        const svg = await buildVectorSVG();
        download('grid-blob.svg', new Blob([svg], { type: 'image/svg+xml' }));
        return;
      }
      const canvas = await rasterize(scale, fmt === 'jpg' ? '#ffffff' : null);
      const mime = fmt === 'jpg' ? 'image/jpeg' : 'image/png';
      const ext  = fmt === 'jpg' ? 'jpg' : 'png';
      canvas.toBlob(b => download(`grid-blob@${scale}x.${ext}`, b), mime, fmt === 'jpg' ? 0.92 : undefined);
    } catch (err) {
      toast('Export failed');
    }
  });

  /* Copy as SVG — write the baked-vector markup to the clipboard. Figma turns
     pasted SVG text into editable vector layers (Ctrl/Cmd+V on the canvas). */
  $('copySvgBtn').addEventListener('click', async () => {
    try {
      const svg = await buildVectorSVG();
      await navigator.clipboard.writeText(svg);
      toast('SVG copied — paste into Figma');
    } catch (err) {
      toast('Copy failed');
    }
  });

  /* Mobile sidebar toggle (slide-in panel below the responsive breakpoint) */
  $('sidebarToggle').addEventListener('click', () => document.body.classList.toggle('sidebar-open'));
  $('sidebarBackdrop').addEventListener('click', () => document.body.classList.remove('sidebar-open'));
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.body.classList.contains('sidebar-open')) document.body.classList.remove('sidebar-open');
  });

  /* Zoom */
  function setZoom(z) {
    z = Math.max(0.05, Math.min(8, z));
    state.zoom = z;
    document.documentElement.style.setProperty('--zoom', z);
    $('zoomLabel').textContent = Math.round(z * 100) + '%';
    document.querySelectorAll('#zoomDropdown .dropdown-item').forEach(item => {
      item.classList.toggle('selected', Math.abs(+item.dataset.zoom - z) < 0.001);
    });
  }
  $('zoomIn').addEventListener('click', () => setZoom(state.zoom * 1.25));
  $('zoomOut').addEventListener('click', () => setZoom(state.zoom / 1.25));
  document.querySelectorAll('#zoomDropdown .dropdown-item').forEach(item => {
    item.addEventListener('click', () => {
      setZoom(+item.dataset.zoom);
      $('zoomDropdown').classList.remove('open');
    });
  });
  const zoomDd = $('zoomDropdown');
  zoomDd.querySelector('.dropdown-btn').addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    if (zoomDd.classList.contains('open')) zoomDd.classList.remove('open');
    else {
      document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
      zoomDd.classList.add('open');
    }
  });
  document.addEventListener('mousedown', e => {
    if (!zoomDd.contains(e.target)) zoomDd.classList.remove('open');
  });
  $('canvasArea').addEventListener('wheel', e => {
    if (!e.ctrlKey) return;
    e.preventDefault();
    const delta = -e.deltaY * 0.0015;
    setZoom(state.zoom * (1 + delta));
  }, { passive: false });
  state.zoom = 1;

  /* Pan — middle mouse button drag OR hold H + left drag */
  state.panX = 0;
  state.panY = 0;
  function applyPan() {
    document.documentElement.style.setProperty('--pan-x', state.panX + 'px');
    document.documentElement.style.setProperty('--pan-y', state.panY + 'px');
  }
  applyPan();
  let panning = false;
  let panStart = null;
  let hKeyDown = false;
  const canvasAreaEl = $('canvasArea');
  function startPan(e) {
    panning = true;
    panStart = { x: e.clientX, y: e.clientY, panX: state.panX, panY: state.panY };
    canvasAreaEl.classList.add('panning');
    e.preventDefault();
    e.stopPropagation();
  }
  canvasAreaEl.addEventListener('mousedown', e => {
    if (e.button === 1 || (e.button === 0 && hKeyDown)) startPan(e);
  }, true);
  window.addEventListener('mousemove', e => {
    if (!panning) return;
    state.panX = panStart.panX + (e.clientX - panStart.x);
    state.panY = panStart.panY + (e.clientY - panStart.y);
    applyPan();
  });
  window.addEventListener('mouseup', () => {
    if (panning) { panning = false; canvasAreaEl.classList.remove('panning'); }
  });
  // Prevent the middle-click auto-scroll wheel cursor
  canvasAreaEl.addEventListener('auxclick', e => { if (e.button === 1) e.preventDefault(); });
  window.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey) return;
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (e.key === 'h' || e.key === 'H' || e.code === 'Space') {
      e.preventDefault();
      if (!hKeyDown) { hKeyDown = true; canvasAreaEl.classList.add('h-mode'); }
    }
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'h' || e.key === 'H' || e.code === 'Space') {
      hKeyDown = false;
      canvasAreaEl.classList.remove('h-mode');
    }
  });

  /* Custom dropdown — replaces native <select> visuals */
  function enhanceSelect(sel) {
    if (sel.dataset.enhanced) return;
    sel.dataset.enhanced = '1';

    const dd = document.createElement('div');
    dd.className = 'dropdown';

    const btn = document.createElement('button');
    btn.className = 'dropdown-btn';
    btn.type = 'button';
    btn.tabIndex = -1;
    btn.innerHTML = `<span class="dropdown-label"></span><span class="dropdown-caret">▾</span>`;

    const menu = document.createElement('div');
    menu.className = 'dropdown-menu';

    [...sel.options].forEach(opt => {
      const item = document.createElement('button');
      item.className = 'dropdown-item';
      item.type = 'button';
      item.dataset.value = opt.value;
      item.innerHTML = `<span class="dropdown-check">✓</span><span>${opt.textContent}</span>`;
      item.addEventListener('click', () => {
        if (sel.value !== opt.value) {
          sel.value = opt.value;
          sel.dispatchEvent(new Event('change', { bubbles: true }));
        }
        sync();
        close();
      });
      menu.appendChild(item);
    });

    dd.appendChild(btn);
    dd.appendChild(menu);
    sel.parentNode.insertBefore(dd, sel);

    function sync() {
      const opt = sel.options[sel.selectedIndex];
      btn.querySelector('.dropdown-label').textContent = opt ? opt.textContent : '';
      [...menu.children].forEach(item => {
        item.classList.toggle('selected', item.dataset.value === sel.value);
      });
    }
    function open() {
      document.querySelectorAll('.dropdown.open').forEach(d => { if (d !== dd) d.classList.remove('open'); });
      dd.classList.add('open');
    }
    function close() {
      dd.classList.remove('open');
    }

    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      if (dd.classList.contains('open')) close(); else open();
    });

    document.addEventListener('mousedown', e => {
      if (!dd.contains(e.target)) close();
    });

    sel.addEventListener('change', sync);
    sync();
  }
  document.querySelectorAll('select').forEach(enhanceSelect);

  /* Shift + Arrow Up/Down → step by 10 (plain arrows keep native ±1) */
  document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('keydown', e => {
      if (!e.shiftKey || (e.key !== 'ArrowUp' && e.key !== 'ArrowDown')) return;
      e.preventDefault();
      const cur = +input.value || 0;
      let next = cur + (e.key === 'ArrowUp' ? 10 : -10);
      if (input.min !== '' && next < +input.min) next = +input.min;
      if (input.max !== '' && next > +input.max) next = +input.max;
      input.value = next;
      input.dispatchEvent(new Event('input', { bubbles: true }));
      input.dispatchEvent(new Event('change', { bubbles: true }));
    });
  });

  /* Style presets — gradient backgrounds + box appearance.
     Structure leaves room for future user-saved presets (e.g. from localStorage). */
  const STYLES = {
    custom: { name: 'Custom', gradient: null, box: null },
    blue:   { name: 'Blue',   gradient: ['#1470BD', '#49B8EC'], box: { color: '#ffffff', alpha: 40 } },
    purple: { name: 'Purple', gradient: ['#6C22C9', '#B95CFF'], box: { color: '#ffffff', alpha: 40 } },
    silver: { name: 'Silver', gradient: ['#59636A', '#A5ADB2'], box: { color: '#ffffff', alpha: 40 } },
    white:  { name: 'White',  gradient: ['#A4AFB6', '#F3F5F7'], box: { color: '#ffffff', alpha: 40 } },
  };
  // Capture / restore the visual "style" (no geometry, no painted cells).
  function snapshotStyle() {
    return {
      artboardPaint: JSON.parse(JSON.stringify(state.artboardPaint)),
      boxPaint: JSON.parse(JSON.stringify(state.boxPaint)),
      gridColor: state.gridColor, gridAlpha: state.gridAlpha, gridStroke: state.gridStroke,
      boxR: state.boxR, neckR: state.neckR, shape: state.shape,
    };
  }
  function applyStyleSnap(s) {
    state.artboardPaint = JSON.parse(JSON.stringify(s.artboardPaint));
    state.boxPaint = JSON.parse(JSON.stringify(s.boxPaint));
    if (s.gridColor != null) state.gridColor = s.gridColor;
    if (s.gridAlpha != null) state.gridAlpha = s.gridAlpha;
    if (s.gridStroke != null) state.gridStroke = s.gridStroke;
    if (s.boxR != null) state.boxR = s.boxR;
    if (s.neckR != null) state.neckR = s.neckR;
    if (s.shape) state.shape = s.shape;
    syncPaintToLegacy('artboard');
    syncPaintToLegacy('box');
  }
  function applyStyle(name) {
    const builtin = STYLES[name];
    const user = userPresets.find(p => p.id === name);
    if (!builtin && !user) return;
    pushHistory('style');
    state.style = name;
    if (user) {
      applyStyleSnap(user.snap);
    } else if (builtin.gradient) {
      // Built-in preset → artboard linear gradient (135°) + box white-40% solid
      state.artboardPaint = { type: 'linear', angle: 135, stops: [
        { color: builtin.gradient[0], alpha: 100, pos: 0 },
        { color: builtin.gradient[1], alpha: 100, pos: 1 },
      ]};
      if (builtin.box) state.boxPaint = { type: 'solid', angle: 135, stops: [
        { color: builtin.box.color, alpha: builtin.box.alpha, pos: 0 },
        { color: builtin.box.color, alpha: 0, pos: 1 },
      ]};
    }
    applyAll();
  }
  function updateStyleLabel() {
    const sw = $('styleSwatchActive');
    const user = userPresets.find(p => p.id === state.style);
    if (user) {
      $('styleLabel').textContent = user.name;
      sw.style.background = paintToCSS(user.snap.artboardPaint);
      sw.classList.remove('custom');
    } else {
      const s = STYLES[state.style] || STYLES.custom;
      $('styleLabel').textContent = s.name;
      if (s.gradient) {
        sw.style.background = `linear-gradient(135deg, ${s.gradient[0]}, ${s.gradient[1]})`;
        sw.classList.remove('custom');
      } else {
        sw.removeAttribute('style');
        sw.classList.add('custom');
      }
    }
    document.querySelectorAll('#styleDropdown .dropdown-item').forEach(item => {
      item.classList.toggle('selected', item.dataset.style === state.style);
    });
  }
  const styleDd = $('styleDropdown');
  styleDd.querySelector('.dropdown-btn').addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    if (styleDd.classList.contains('open')) styleDd.classList.remove('open');
    else {
      document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
      styleDd.classList.add('open');
    }
  });
  document.addEventListener('mousedown', e => {
    if (!styleDd.contains(e.target)) styleDd.classList.remove('open');
  });
  // Delegated click: built-in + user presets share one handler; the (×) on a
  // user preset deletes it instead of selecting.
  styleDd.querySelector('.dropdown-menu').addEventListener('click', e => {
    const del = e.target.closest('.preset-del');
    if (del) { e.stopPropagation(); deleteUserPreset(del.dataset.id); return; }
    const item = e.target.closest('.dropdown-item');
    if (!item) return;
    applyStyle(item.dataset.style);
    styleDd.classList.remove('open');
  });

  /* ---- User-defined style presets (localStorage) ---- */
  const PRESETS_KEY = 'gridBlobPresets';
  let userPresets = [];
  function loadUserPresets() {
    try { userPresets = JSON.parse(localStorage.getItem(PRESETS_KEY)) || []; }
    catch (e) { userPresets = []; }
  }
  function persistUserPresets() {
    try { localStorage.setItem(PRESETS_KEY, JSON.stringify(userPresets)); } catch (e) {}
  }
  function renderUserPresets() {
    const menu = styleDd.querySelector('.dropdown-menu');
    menu.querySelectorAll('.dropdown-item.user-preset').forEach(n => n.remove());
    userPresets.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'dropdown-item user-preset';
      btn.type = 'button';
      btn.dataset.style = p.id;
      btn.innerHTML = '<span class="dropdown-check">✓</span>'
        + '<span class="style-item"><span class="style-swatch"></span><span class="preset-name"></span></span>'
        + '<span class="preset-del" title="Delete preset">×</span>';
      btn.querySelector('.style-swatch').style.background = paintToCSS(p.snap.artboardPaint);
      btn.querySelector('.preset-name').textContent = p.name;
      btn.querySelector('.preset-del').dataset.id = p.id;
      menu.appendChild(btn);
    });
    updateStyleLabel();
  }
  function deleteUserPreset(id) {
    const i = userPresets.findIndex(p => p.id === id);
    if (i === -1) return;
    userPresets.splice(i, 1);
    persistUserPresets();
    if (state.style === id) state.style = 'custom';
    renderUserPresets();
    applyAll();
    toast('Preset deleted');
  }

  // Save modal — shared by style presets (kind 'style') and size presets ('size')
  const presetModal = $('presetModal'), presetNameInput = $('presetNameInput');
  let savingKind = 'style';
  function openPresetModal(kind) {
    savingKind = kind || 'style';
    $('presetModalTitle').textContent = savingKind === 'size' ? 'Save size' : 'Save style';
    presetNameInput.value = '';
    presetModal.classList.add('open');
    setTimeout(() => presetNameInput.focus(), 30);
  }
  function closePresetModal() { presetModal.classList.remove('open'); }
  function confirmSavePreset() {
    const name = presetNameInput.value.trim();
    if (!name) { presetNameInput.focus(); return; }
    const id = 'user-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    if (savingKind === 'size') {
      userTemplates.push(Object.assign({ id, name }, snapshotSize()));
      persistUserTemplates();
      renderUserTemplates();
      closePresetModal();
      applyAll();             // re-detect → the new size shows as selected
      toast('Size saved');
    } else {
      userPresets.push({ id, name, snap: snapshotStyle() });
      persistUserPresets();
      renderUserPresets();
      closePresetModal();
      state.style = id;       // select the freshly saved preset
      applyAll();
      toast('Preset saved');
    }
  }
  $('savePresetBtn').addEventListener('click', () => openPresetModal('style'));
  $('presetCancelBtn').addEventListener('click', closePresetModal);
  $('presetSaveConfirmBtn').addEventListener('click', confirmSavePreset);
  presetModal.addEventListener('mousedown', e => { if (e.target === presetModal) closePresetModal(); });
  presetNameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); confirmSavePreset(); }
    else if (e.key === 'Escape') { e.preventDefault(); closePresetModal(); }
  });

  loadUserPresets();
  renderUserPresets();

  /* Templates — left control mirroring zoom on right */
  const TEMPLATES = {
    slider:   { name: 'Slider banner',   w: 800, h: 400, padding: 40, cols: 18, rows: 8 },
    category: { name: 'Category banner', w: 299, h: 440, padding: 32, cols: 10, rows: 16 },
    custom:   { name: 'Custom',          w: 800, h: 600, padding: 40, cols: 18, rows: 13 },
  };
  function templateMatches(t) {
    return state.bannerW === t.w && state.bannerH === t.h
        && state.padding === t.padding
        && state.cols === t.cols && state.rows === t.rows;
  }
  function detectTemplate() {
    for (const [name, t] of Object.entries(TEMPLATES)) {
      if (name === 'custom') continue;
      if (templateMatches(t)) return name;
    }
    const u = userTemplates.find(p => templateMatches(p));
    if (u) return u.id;
    return 'custom';
  }
  function updateTemplateLabel() {
    const cur = detectTemplate();
    const u = userTemplates.find(p => p.id === cur);
    $('templateLabel').textContent = u ? u.name : TEMPLATES[cur].name;
    document.querySelectorAll('#templateDropdown .dropdown-item').forEach(item => {
      item.classList.toggle('selected', item.dataset.template === cur);
    });
  }
  function applyTemplate(name) {
    const t = TEMPLATES[name] || userTemplates.find(p => p.id === name);
    if (!t) return;
    pushHistory('template');
    state.bannerW = t.w;
    state.bannerH = t.h;
    state.padding = t.padding;
    state.cols = t.cols;
    state.rows = t.rows;
    applyAll();
  }
  const templateDd = $('templateDropdown');
  templateDd.querySelector('.dropdown-btn').addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    if (templateDd.classList.contains('open')) templateDd.classList.remove('open');
    else {
      document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
      templateDd.classList.add('open');
    }
  });
  document.addEventListener('mousedown', e => {
    if (!templateDd.contains(e.target)) templateDd.classList.remove('open');
  });
  // Delegated click: built-in + user size presets; (×) deletes a user preset.
  templateDd.querySelector('.dropdown-menu').addEventListener('click', e => {
    const del = e.target.closest('.preset-del');
    if (del) { e.stopPropagation(); deleteUserTemplate(del.dataset.id); return; }
    const item = e.target.closest('.dropdown-item');
    if (!item) return;
    applyTemplate(item.dataset.template);
    templateDd.classList.remove('open');
  });

  /* ---- User-defined size presets (saved into the Templates dropdown) ---- */
  const TEMPLATES_KEY = 'gridBlobTemplates';
  let userTemplates = [];
  function loadUserTemplates() {
    try { userTemplates = JSON.parse(localStorage.getItem(TEMPLATES_KEY)) || []; }
    catch (e) { userTemplates = []; }
  }
  function persistUserTemplates() {
    try { localStorage.setItem(TEMPLATES_KEY, JSON.stringify(userTemplates)); } catch (e) {}
  }
  function snapshotSize() {
    return { w: state.bannerW, h: state.bannerH, padding: state.padding, cols: state.cols, rows: state.rows };
  }
  function renderUserTemplates() {
    const menu = templateDd.querySelector('.dropdown-menu');
    menu.querySelectorAll('.dropdown-item.user-preset').forEach(n => n.remove());
    userTemplates.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'dropdown-item user-preset';
      btn.type = 'button';
      btn.dataset.template = p.id;
      btn.innerHTML = '<span class="dropdown-check">✓</span>'
        + '<span class="template-item"><span class="name"></span><span class="size"></span></span>'
        + '<span class="preset-del" title="Delete size">×</span>';
      btn.querySelector('.name').textContent = p.name;
      btn.querySelector('.size').textContent = p.w + ' × ' + p.h;
      btn.querySelector('.preset-del').dataset.id = p.id;
      menu.appendChild(btn);
    });
    updateTemplateLabel();
  }
  function deleteUserTemplate(id) {
    const i = userTemplates.findIndex(p => p.id === id);
    if (i === -1) return;
    userTemplates.splice(i, 1);
    persistUserTemplates();
    renderUserTemplates();
    applyAll();
    toast('Size deleted');
  }
  $('saveTemplateBtn').addEventListener('click', () => openPresetModal('size'));

  loadUserTemplates();
  renderUserTemplates();

  // Hook into applyAll so template/style labels + brush preview auto-update
  const _origApplyAll = applyAll;
  applyAll = function() {
    _origApplyAll();
    updateTemplateLabel();
    updateStyleLabel();
    updateBrushPreview();
  };

  applyAll();
</script>
</body>
</html>
